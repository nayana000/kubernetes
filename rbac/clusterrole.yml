#role(cluster role)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mysacrole
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list"]

---

#cluster role binding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mysacrolebinding
subjects:
- kind: ServiceAccount
  name: mysa
  namespace: default
roleRef:
  kind: ClusterRole
  name: mysacrole
  apiGroup: rbac.authorization.k8s.io
